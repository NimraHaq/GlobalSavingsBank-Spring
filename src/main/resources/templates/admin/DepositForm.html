<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Amount &middot; Vault</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body class="page-form">

<div class="form-wrap">
    <div class="form-head">
        <h1>Deposit Amount</h1>
        <p>Credit funds into the selected card.</p>
    </div>

    <div class="form-body">

        <!-- rejected by the server-side amount checks -->
        <div class="alert alert-error" th:if="${param.invalidAmount}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Deposit amount must be greater than zero.</span>
        </div>
        <div class="alert alert-error" th:if="${param.amountTooLarge}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Deposit amount cannot exceed <span th:text="${maxAmount}"></span>.</span>
        </div>

        <!-- POST form; th:action injects the CSRF token automatically -->
        <form th:action="@{/admin/processAdminDeposit}" method="post">

            <input type="hidden" name="cardNo" th:value="${cardNo}" />

            <div class="field">
                <label for="cardNoDisplay">Card Number</label>
                <input type="text" id="cardNoDisplay" th:value="${cardNo}" disabled />
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount"
                       min="0.01" step="0.01" th:max="${maxAmount}" placeholder="e.g. 1000.00"
                       autocomplete="off" required />
                <small>Maximum <span th:text="${maxAmount}"></span> per deposit.</small>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Deposit</button>
                <a th:href="@{/admin/showCustomers}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
