<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in &middot; Vault</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body class="page-auth">

    <!-- Left: brand / trust panel -->
    <aside class="brand-panel">
        <div class="brand-mark">
            <span class="glyph">V</span>
            Vault
        </div>

        <div class="brand-copy">
            <h1>Your money, in steady hands.</h1>
        </div>

        <div class="brand-foot"></div>
    </aside>

    <!-- Right: login form -->
    <main class="form-panel">
        <div class="form-card">
            <div class="lead">
                <h2>Sign in</h2>
                <p class="sub">Welcome back. Enter your details to continue.</p>
            </div>

            <!-- Error: shown when ?error is present after a failed login -->
            <div class="alert alert-error" th:if="${param.error}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                <span>That username or password didn't match. Please try again.</span>
            </div>

            <!-- Logout: shown after a successful logout -->
<!--            <div class="alert alert-ok" th:if="${param.logout}">-->
<!--                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>-->
<!--                <span>You've been signed out securely.</span>-->
<!--            </div>-->

            <!-- Posts to /login + post method; Spring Security intercepts this POST.-->
            <form th:action="@{/login}" method="post">

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="e.g. n.haq" autocomplete="username"
                           required autofocus />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password"
                           required />
                </div>

<!--                <div class="row-between">-->
<!--                    <label class="remember">-->
<!--                        <input type="checkbox" name="remember-me" />-->
<!--                        Keep me signed in-->
<!--                    </label>-->
<!--                    <a th:href="@{/forgot-password}">Forgot password?</a>-->
<!--                </div>-->

                <button type="submit" class="btn-signin">Sign in</button>
                <br/>
                <p class="sub">First Time? <a th:href="@{/showFormToRegisterUser}">register</a> yourselves.</p>
            </form>

        </div>
    </main>

</body>
</html>
