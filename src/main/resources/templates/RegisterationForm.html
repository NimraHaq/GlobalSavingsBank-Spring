<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User &middot; Vault</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body class="page-form">

<div class="form-wrap">
    <div class="form-head">
        <h1>Register User</h1>
        <p>Set password against your provided username.</p>
    </div>

    <div class="form-body">

        <!-- not-found / mismatch message -->
        <div class="alert alert-error" th:if="${param.notfound}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>No user found matching that username and CNIC.</span>
        </div>
        <div class="alert alert-error" th:if="${param.alreadyRegistered}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>User is already registered. Please login.</span>
        </div>
        <div class="alert alert-error" th:if="${param.passwordError}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Password length must be created than 7 and less than 13.</span>
        </div>
        <div class="alert alert-error" th:if="${param.incompleteData}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Kindly provide username and cnic.</span>
        </div>

        <form th:action="@{/processFormToRegisterUser}" method="post">

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="e.g. n.haq" required />
            </div>

            <div class="field">
                <label for="cnic">CNIC</label>
                <input type="text" id="cnic" name="cnic"
                       placeholder="XXXXX-XXXXXXX-X" autocomplete="off" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" required minlength="8" maxlength="12"/>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
