<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in &middot; Global Savings Bank</title>
    <style>
        :root {
            --navy:      #0d1b3e;
            --navy-deep: #081027;
            --ink:       #1a2238;
            --mist:      #e8ecf4;
            --line:      #d3dae8;
            --accent:    #2f6df6;
            --accent-dk: #1f53c9;
            --gold:      #c8a24a;
            --muted:     #6b7689;
            --danger:    #b3261e;
            --danger-bg: #fbe9e7;
            --ok:        #1b7a47;
            --ok-bg:     #e6f4ec;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.05fr 1fr;
            background: #fff;
        }

        /* ---------- Left brand panel ---------- */
        .brand-panel {
            position: relative;
            background:
                linear-gradient(160deg, rgba(8,16,39,.78) 0%, rgba(13,27,62,.62) 100%),
                url("/assets/img/p9.jpg") center / cover no-repeat;
            color: #fff;
            padding: 56px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            letter-spacing: .02em;
            font-size: 1.05rem;
        }
        .brand-mark .glyph {
            width: 34px; height: 34px;
            display: grid; place-items: center;
            border: 1.5px solid rgba(255,255,255,.55);
            border-radius: 8px;
            font-weight: 700;
            color: var(--gold);
        }

        .brand-copy { max-width: 26ch; }
        .brand-copy .eyebrow {
            font-size: .72rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 18px;
        }
        .brand-copy h1 {
            font-size: 2.5rem;
            line-height: 1.12;
            font-weight: 600;
            letter-spacing: -.01em;
        }
        .brand-copy p {
            margin-top: 18px;
            color: rgba(255,255,255,.72);
            font-size: 1.02rem;
            line-height: 1.55;
            max-width: 34ch;
        }

        .assurance {
            display: flex;
            gap: 26px;
            font-size: .82rem;
            color: rgba(255,255,255,.62);
        }
        .assurance span { display: flex; align-items: center; gap: 8px; }
        .assurance svg { opacity: .85; }

        .brand-panel > * { position: relative; z-index: 1; }

        /* ---------- Right form panel ---------- */
        .form-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .form-card { width: 100%; max-width: 380px; }

        .form-card .lead { margin-bottom: 32px; }
        .form-card h2 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -.01em;
        }
        .form-card .sub {
            color: var(--muted);
            margin-top: 8px;
            font-size: .95rem;
        }

        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
            letter-spacing: .01em;
        }
        .field input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: .98rem;
            color: var(--ink);
            background: #fbfcfe;
            transition: border-color .15s, box-shadow .15s, background .15s;
        }
        .field input::placeholder { color: #aab2c2; }
        .field input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(47,109,246,.15);
        }

        .row-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 26px;
        }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .88rem;
            color: var(--muted);
            cursor: pointer;
        }
        .remember input { width: 16px; height: 16px; accent-color: var(--accent); }
        .row-between a {
            font-size: .88rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .row-between a:hover { text-decoration: underline; }

        .btn-signin {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .01em;
            cursor: pointer;
            transition: background .15s, transform .05s;
        }
        .btn-signin:hover { background: var(--accent-dk); }
        .btn-signin:active { transform: translateY(1px); }
        .btn-signin:focus-visible {
            outline: 3px solid rgba(47,109,246,.4);
            outline-offset: 2px;
        }

        .signup-line {
            margin-top: 26px;
            text-align: center;
            font-size: .9rem;
            color: var(--muted);
        }
        .signup-line a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .signup-line a:hover { text-decoration: underline; }

        /* ---------- Alerts ---------- */
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: .9rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1.4;
        }
        .alert-error { background: var(--danger-bg); color: var(--danger); }
        .alert-ok    { background: var(--ok-bg);     color: var(--ok); }
        .alert svg { flex-shrink: 0; }

        /* ---------- Responsive ---------- */
        @media (max-width: 860px) {
            body { grid-template-columns: 1fr; }
            .brand-panel {
                padding: 40px 32px;
                min-height: auto;
                gap: 28px;
            }
            .brand-copy h1 { font-size: 1.9rem; }
            .assurance { flex-wrap: wrap; gap: 14px 24px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <!-- Left: brand / trust panel -->
    <aside class="brand-panel">
        <div class="brand-mark">
            <span class="glyph">G</span>
            Global Savings Bank
        </div>

        <div class="brand-copy">
            <h1>Your money, in steady hands.</h1>
        </div>

        <div class="brand-foot"></div>
    </aside>

    <!-- Right: login form -->
    <main class="form-panel">
        <div class="form-card">
            <div class="lead">
                <h2>Sign in</h2>
                <p class="sub">Welcome back. Enter your details to continue.</p>
            </div>

            <!-- Error: shown when ?error is present after a failed login -->
            <div class="alert alert-error" th:if="${param.error}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                <span>That username or password didn't match. Please try again.</span>
            </div>

            <!-- Logout: shown after a successful logout -->
<!--            <div class="alert alert-ok" th:if="${param.logout}">-->
<!--                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>-->
<!--                <span>You've been signed out securely.</span>-->
<!--            </div>-->

            <!-- Posts to /login + post method; Spring Security intercepts this POST.-->
            <form th:action="@{/login}" method="post">

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="e.g. n.haq" autocomplete="username"
                           required autofocus />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password"
                           required />
                </div>

<!--                <div class="row-between">-->
<!--                    <label class="remember">-->
<!--                        <input type="checkbox" name="remember-me" />-->
<!--                        Keep me signed in-->
<!--                    </label>-->
<!--                    <a th:href="@{/forgot-password}">Forgot password?</a>-->
<!--                </div>-->

                <button type="submit" class="btn-signin">Sign in</button>
            </form>

<!--            <p class="signup-line">-->
<!--                New to Global Savings? <a th:href="@{/register}">Open an account</a>-->
<!--            </p>-->
        </div>
    </main>

</body>
</html>
