<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete User &middot; Vault</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body class="page-form">

<div class="form-wrap">
    <div class="form-head">
        <h1>Delete User</h1>
        <p>Remove a user account by verifying username and CNIC.</p>
    </div>

    <div class="form-body">

        <!-- permanent-action warning -->
        <div class="warn-banner">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l10 18H2L12 2z"/><path d="M12 9v4M12 17h.01"/></svg>
            <span>This permanently deletes the user account. This action cannot be undone.</span>
        </div>

        <!-- not-found / mismatch message -->
        <div class="alert alert-error" th:if="${param.notfound}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>No user found matching that username and CNIC.</span>
        </div>
        <div class="alert alert-error" th:if="${param.incompleteData}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Kindly provide username and cnic.</span>
        </div>
        <div class="alert alert-error" th:if="${param.loggedInUserCannotDeleted}">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span>Logged-in user cannot be deleted.</span>
        </div>

        <!-- POST form; th:action injects the CSRF token automatically -->
        <form th:action="@{/admin/processFormToDeleteUser}" method="post">

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="e.g. n.haq" required />
            </div>

            <div class="field">
                <label for="cnic">CNIC</label>
                <input type="text" id="cnic" name="cnic"
                       placeholder="XXXXX-XXXXXXX-X" autocomplete="off" required />
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-danger">Delete User</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
