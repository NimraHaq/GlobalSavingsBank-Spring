spring.application.name=lombok

spring.datasource.url=jdbc:mysql://localhost:3306/cards
spring.datasource.username=nimra
spring.datasource.password=1234

#executes if there is any update in DDLs
spring.jpa.hibernate.ddl-auto=update


#for logging all sql
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

#for printing sql on console, not for production
spring.jpa.show-sql=true    
spring.jpa.properties.hibernate.format_sql=true